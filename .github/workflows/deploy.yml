name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      
    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
        cache: 'npm'

    # The npm bundled with the Node 24 runner image hits the
    # "Exit handler never called!" bug on `npm ci`. Pin a known-good npm.
    - name: Update npm
      run: npm install -g npm@11.12.1

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build
      run: npm run build
      
    - name: Create .nojekyll file
      run: touch dist/.nojekyll
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4.0.0
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist